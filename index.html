<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울산 고정밀 악취 및 오염 가우시안 확산 예측 시스템</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary: #2563EB;
            --secondary: #06B6D4;
            --dark-bg: #020617;
            --dark-card: #0F172A;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border-color: rgba(6, 182, 212, 0.2);
            --highlight: #38BDF8;

            --safe-color: #10B981;
            --warning-color: #F59E0B;
            --danger-color: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            padding: 15px;
            height: 100vh; /* 화면 꽉 차게 */
            display: flex;
            justify-content: center;
            overflow: hidden; /* 외부 스크롤 방지 */
        }

        .dashboard {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%; /* 대시보드 높이 고정 */
        }

        /* 상단 헤더 */
        .header {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0; /* 헤더 찌그러짐 방지 */
        }
        .header h1 { margin: 0; font-size: 1.6rem; letter-spacing: -0.5px; font-weight: 800; }
        .header p { margin: 6px 0 0 0; font-size: 0.9rem; color: var(--text-muted); }
        .header .timestamp { 
            position: absolute; right: 25px; top: 25px; 
            font-size: 0.85rem; background: rgba(6, 182, 212, 0.1); 
            color: var(--secondary); padding: 6px 12px; border-radius: 20px; 
            border: 1px solid var(--border-color); font-weight: bold;
        }
        
        .layout-container {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0; /* Flexbox 하위 요소 스크롤을 위한 필수 설정 */
        }

        /* 좌측 사이드바 */
        .sidebar {
            flex: 1;
            min-width: 380px;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0; /* 스크롤 활성화를 위한 필수 설정 */
        }
        
        .pane-section { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px);
            padding: 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        .pane-title { font-size: 1.05rem; font-weight: bold; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        
        /* 버튼 및 컨트롤 */
        .mode-toggle-box { display: flex; gap: 8px; margin-bottom: 15px; flex-shrink: 0;}
        .mode-btn { 
            flex: 1; background: rgba(2, 6, 23, 0.6); border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-muted); padding: 10px; font-weight: bold; cursor: pointer; 
            border-radius: 8px; font-size: 0.85rem; transition: all 0.3s; 
        }
        .mode-btn:hover { border-color: var(--secondary); color: var(--text-main); }
        .mode-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4); }
        
        .control-group { margin-bottom: 15px; flex-shrink: 0;}
        .control-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
        input[type=range] { width: 100%; accent-color: var(--secondary); background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; outline: none;}
        
        /* 스테이션 목록 및 스크롤 디자인 */
        .station-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto; /* 내부 스크롤 활성화 */
            padding-right: 5px; 
            flex: 1; 
            min-height: 0; 
        }
        .station-grid::-webkit-scrollbar { width: 6px; }
        .station-grid::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 4px; }
        .station-grid::-webkit-scrollbar-track { background: transparent; }

        .station-row { 
            background: rgba(2, 6, 23, 0.6); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 10px; padding: 12px; font-size: 0.85rem; 
            display: flex; justify-content: space-between; align-items: center; 
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .station-row:hover { border-color: rgba(6, 182, 212, 0.4); background: rgba(15, 23, 42, 0.8); }
        .station-name { font-weight: bold; color: var(--secondary); font-size: 0.95rem; margin-bottom: 4px; display: inline-block;}
        .station-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        
        /* 지도 섹션 */
        .map-section {
            flex: 2;
            min-width: 500px;
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); 
            border-radius: 16px;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }
        
        .map-wrapper { position: relative; width: 100%; height: 100%; border-radius: 12px; overflow: hidden; background: #020617; }
        #map { width: 100%; height: 100%; background: transparent; }
        
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%);
        }

        #overlayCanvas { position: absolute; top: 0; left: 0; z-index: 1000; pointer-events: none; }
        
        /* 하단 알림 패널 */
        .alert-panel { 
            padding: 16px; text-align: center; font-size: 1.05rem; font-weight: bold; 
            border-radius: 16px; border: 1px solid; letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .status-safe { background-color: rgba(16, 185, 129, 0.1); color: var(--safe-color); border-color: rgba(16, 185, 129, 0.3); }
        .status-warning { background-color: rgba(245, 158, 11, 0.1); color: var(--warning-color); border-color: rgba(245, 158, 11, 0.3); }
        .status-danger { background-color: rgba(239, 68, 68, 0.1); color: var(--danger-color); border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        
        .zone-tooltip { 
            background: rgba(15, 23, 42, 0.95); color: #fff; 
            border: 1px solid var(--secondary); box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            font-weight: normal; padding: 6px 10px; border-radius: 6px; 
        }
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before, .leaflet-tooltip-left:before, .leaflet-tooltip-right:before {
            border-top-color: rgba(15, 23, 42, 0.95) !important;
        }

        /* tuto.html 이동 버튼 */
        .nav-info-btn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.4);
            z-index: 9999;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
        }
        .nav-info-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.6);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .nav-info-btn .icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>🌬️ 울산 고정밀 악취 및 오염 가우시안 확산 예측 시스템</h1>
        <p>기상청 실시간 수치 모델 검증 및 에어코리아 측정소 단위 환경 데이터 정밀 보정 (7대 주거거점 & 산단 좌표 최적화)</p>
        <div class="timestamp" id="liveClock">SYSTEM LIVE</div>
    </div>

    <div class="layout-container">
        <div class="sidebar">
            <div class="pane-section">
                <div class="pane-title">🕹️ 시스템 구동 제어</div>
                <div class="mode-toggle-box">
                    <button id="btnAuto" class="mode-btn active" onclick="setMode('AUTO')">자동 측정망 동기화</button>
                    <button id="btnManual" class="mode-btn" onclick="setMode('MANUAL')">가상 시뮬레이션</button>
                </div>
                <div class="control-group">
                    <label id="dirLabel">풍향 제어: 로딩 중...</label>
                    <input type="range" id="windDir" min="0" max="360" value="140" disabled>
                </div>
                <div class="control-group">
                    <label id="speedLabel">풍속 제어: 로딩 중...</label>
                    <input type="range" id="windSpeed" min="0" max="15" value="4" disabled>
                </div>
            </div>

            <div class="pane-section" style="flex: 1; min-height: 0;">
                <div class="pane-title">📊 지역 측정소별 실시간 악취 감지망</div>
                <div id="apiErrorMsg" style="color:var(--danger-color); font-size:0.8rem; margin-bottom:10px;"></div>
                <div class="station-grid" id="stationGrid">
                    <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:0.85rem;">오픈 API 동기화 대기 중...</div>
                </div>
            </div>
        </div>

        <div class="map-section">
            <div class="map-wrapper" id="mapWrapper">
                <div id="map"></div>
                <canvas id="overlayCanvas"></canvas>
                
                <a href="tuto.html" class="nav-info-btn" title="AeroRoute 소개 및 프레젠테이션 보기">
                    AeroRoute에 대하여 <span class="icon">🚀</span>
                </a>
            </div>
        </div>
    </div>

    <div id="alertPanel" class="alert-panel status-safe">
        ... 기상 통신선 파악 및 오염 지도 원격 데이터 취합 중 ...
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const API_KEY = '362673347c04c97246cbd44012813a068216d755ca2ecfc92ab82fe3d82c870c'; 
    let systemMode = 'AUTO'; 

    function getDirectionName(angle) {
        const directions = ["북", "북동", "동", "남동", "남", "남서", "서", "북서"];
        return directions[Math.round(((angle %= 360) < 0 ? angle + 360 : angle) / 45) % 8] + "풍";
    }

    const map = L.map('map', { zoomControl: false }).setView([35.535, 129.335], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    const zonesData = {
        ind_petro: { center: [35.4985, 129.3520], radius: 1800, name: "울산석유화학단지 (오염원 A)", color: "#64748B", fillOpacity: 0.3, isSource: true, station: "여천동", pm10: 35, so2: 0.003, no2: 0.015 },
        ind_onsan: { center: [35.4380, 129.3680], radius: 2200, name: "온산국가산업단지 (오염원 B)", color: "#475569", fillOpacity: 0.3, isSource: true, station: "온산읍", pm10: 35, so2: 0.003, no2: 0.015 },
        ind_mipo:  { center: [35.5450, 129.3900], radius: 2500, name: "미포국가산업단지 (오염원 C)", color: "#334155", fillOpacity: 0.3, isSource: true, station: "화산리", pm10: 35, so2: 0.003, no2: 0.015 },
        
        res_namgu:      { center: [35.5320, 129.3250], radius: 1200, name: "남구 삼산·야음 지구", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "야음동", pm10: 35, so2: 0.002, no2: 0.012 },
        res_okdong:     { center: [35.5280, 129.2800], radius: 1400, name: "남구 옥동·무거 지구", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "무거동", pm10: 35, so2: 0.002, no2: 0.012 },
        res_junggu:     { center: [35.5530, 129.3200], radius: 1200, name: "중구 원도심 지구", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "성남동", pm10: 35, so2: 0.002, no2: 0.012 },
        res_innovation: { center: [35.5720, 129.3080], radius: 1300, name: "우정혁신도시 주거지", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "성남동", pm10: 35, so2: 0.002, no2: 0.012 },
        res_donggu:     { center: [35.5020, 129.4280], radius: 1300, name: "동구 방어·전하 지구", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "전하동", pm10: 35, so2: 0.002, no2: 0.012 },
        res_bukgu:      { center: [35.5850, 129.3600], radius: 1400, name: "북구 송정·연암 지구", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "효문동", pm10: 35, so2: 0.002, no2: 0.012 },
        res_beoseo:     { center: [35.5620, 129.2450], radius: 1600, name: "울주 범서(구영·천상)", color: "#06B6D4", fillOpacity: 0.05, isSource: false, station: "무거동", pm10: 35, so2: 0.002, no2: 0.012 }
    };

    const zoneCircles = {};
    for (let key in zonesData) {
        let z = zonesData[key];
        zoneCircles[key] = L.circle(z.center, { radius: z.radius, color: z.color, weight: 1.5, fillOpacity: z.fillOpacity }).addTo(map);
        zoneCircles[key].bindTooltip(`<strong style="color:var(--highlight);">${z.name}</strong><br><span style="color:#CBD5E1;">매칭측정소: ${z.station}</span>`, { permanent: false, className: 'zone-tooltip' });
    }

    const canvas = document.getElementById('overlayCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('mapWrapper');

    function resizeCanvas() { canvas.width = wrapper.clientWidth; canvas.height = wrapper.clientHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const windDirInput = document.getElementById('windDir');
    const windSpeedInput = document.getElementById('windSpeed');
    const dirLabel = document.getElementById('dirLabel');
    const speedLabel = document.getElementById('speedLabel');
    const alertPanel = document.getElementById('alertPanel');
    const errorMsgPanel = document.getElementById('apiErrorMsg');

    let windAngle = parseInt(windDirInput.value);
    let windSpeed = parseInt(windSpeedInput.value);

    function setMode(mode) {
        systemMode = mode;
        if(mode === 'AUTO') {
            document.getElementById('btnAuto').className = "mode-btn active";
            document.getElementById('btnManual').className = "mode-btn";
            windDirInput.disabled = true; windSpeedInput.disabled = true;
            fetchKMAWeather();
        } else {
            document.getElementById('btnAuto').className = "mode-btn";
            document.getElementById('btnManual').className = "mode-btn active";
            windDirInput.disabled = false; windSpeedInput.disabled = false;
            updateLabelsManual();
        }
    }

    function updateLabelsManual() {
        dirLabel.innerHTML = `풍향 제어: <span style="color:var(--text-main)">${windAngle}° (${getDirectionName(windAngle)})</span> [수동]`;
        speedLabel.innerHTML = `풍속 제어: <span style="color:var(--text-main)">${windSpeed} m/s</span> [수동]`;
    }

    windDirInput.addEventListener('input', (e) => { if(systemMode === 'MANUAL') { windAngle = parseInt(e.target.value); updateLabelsManual(); } });
    windSpeedInput.addEventListener('input', (e) => { if(systemMode === 'MANUAL') { windSpeed = parseInt(e.target.value); updateLabelsManual(); } });

    class Particle {
        constructor() { this.reset(); }
        reset() {
            let sources = [zonesData.ind_petro, zonesData.ind_onsan, zonesData.ind_mipo];
            this.sourceZone = sources[Math.floor(Math.random() * sources.length)];
            
            let r = Math.random() * (this.sourceZone.radius / 111300); 
            let theta = Math.random() * Math.PI * 2;
            this.lat = this.sourceZone.center[0] + r * Math.cos(theta);
            this.lng = this.sourceZone.center[1] + r * Math.sin(theta) / Math.cos(this.sourceZone.center[0] * Math.PI / 180);
            
            this.life = 1.0;
            this.decay = Math.random() * 0.003 + 0.0015;
            this.size = Math.random() * 2 + 1.5;
            this.distance = 0; 
        }
        update() {
            let blowingTo = (windAngle + 180) % 360;
            this.distance += windSpeed * 0.5; 
            let diffusionFactor = Math.min(60, this.distance * 0.4 / (windSpeed + 1)); 
            let spreadAngle = blowingTo + (Math.random() - 0.5) * (30 + diffusionFactor); 
            
            let rad = spreadAngle * (Math.PI / 180);
            let speedFactor = 0.00007; 
            this.lng += Math.sin(rad) * (windSpeed * speedFactor);
            this.lat += Math.cos(rad) * (windSpeed * speedFactor);
            
            this.life -= this.decay;
            this.size += 0.04; 
            if (this.life <= 0 && windSpeed > 0) this.reset();
        }
        draw(ctx) {
            if (this.life <= 0) return;
            let pos = map.latLngToContainerPoint([this.lat, this.lng]);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, this.size, 0, Math.PI * 2);
            
            let so2 = this.sourceZone.so2;
            ctx.shadowBlur = 10;
            if (so2 > 0.007) {
                ctx.fillStyle = `rgba(239, 68, 68, ${this.life * 0.7})`; 
                ctx.shadowColor = '#EF4444';
            } else if (so2 > 0.004) {
                ctx.fillStyle = `rgba(245, 158, 11, ${this.life * 0.6})`; 
                ctx.shadowColor = '#F59E0B';
            } else {
                ctx.fillStyle = `rgba(6, 182, 212, ${this.life * 0.5})`; 
                ctx.shadowColor = '#06B6D4';
            }
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    let particles = Array.from({ length: 500 }, () => new Particle());

    function isInsideCircle(lat, lng, center, radius) {
        return L.latLng(lat, lng).distanceTo(center) <= radius;
    }

    async function fetchKMAWeather() {
        if (systemMode !== 'AUTO') return;
        try {
            const date = "20260617"; 
            const url = `https://apis.data.go.kr/1360000/AsosHourlyInfoService/getWthrDataList?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&dataType=JSON&dataCd=ASOS&dateCd=HR&stnIds=152&startDt=${date}&startHh=10&endDt=${date}&endHh=12`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.response?.body?.items?.item) {
                const latest = data.response.body.items.item[data.response.body.items.item.length - 1];
                windAngle = parseFloat(latest.wd);
                windSpeed = parseFloat(latest.ws);
                windDirInput.value = windAngle;
                windSpeedInput.value = windSpeed;
                dirLabel.innerHTML = `<span style="color:var(--secondary);">[기상청 현황]</span> 풍향: ${windAngle}° (${getDirectionName(windAngle)})`;
                speedLabel.innerHTML = `<span style="color:var(--secondary);">[기상청 현황]</span> 풍속: ${windSpeed.toFixed(1)} m/s`;
            }
        } catch (e) {
            console.warn("기상 정보 백업 데이터 우회 구동");
        }
    }

    async function fetchAirQuality() {
        try {
            const url = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty?serviceKey=${API_KEY}&returnType=json&pageNo=1&numOfRows=30&sidoName=${encodeURIComponent("울산")}&ver=1.0`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.response?.body?.items) {
                const items = data.response.body.items;
                for (let key in zonesData) {
                    let targetStation = zonesData[key].station;
                    let matchedData = items.find(item => item.stationName === targetStation);
                    if (matchedData) {
                        zonesData[key].pm10 = parseInt(matchedData.pm10Value) || 30;
                        zonesData[key].so2 = parseFloat(matchedData.so2Value) || 0.003;
                        zonesData[key].no2 = parseFloat(matchedData.no2Value) || 0.012;
                    }
                }
                renderStationUI();
            }
        } catch (e) {
            errorMsgPanel.innerText = "🚨 에어코리아 동기화 제한 (가상 디폴트 스케일 계산 적용)";
            renderStationUI(); 
        }
    }

    function calculateOdorIntensity(so2, no2, pm10) {
        let score = (so2 * 1000) + (no2 * 100) + (pm10 * 0.1);
        if (score > 25) return { text: "5도 (극심)🔥", color: "var(--danger-color)" };
        if (score > 18) return { text: "4도 (강함)😡", color: "#F43F5E" };
        if (score > 12) return { text: "3도 (확연)⚠️", color: "var(--warning-color)" };
        if (score > 6)  return { text: "2도 (보통)🟡", color: "#FACC15" };
        return { text: "1도 (미미)🟢", color: "var(--safe-color)" };
    }

    function renderStationUI() {
        const grid = document.getElementById('stationGrid');
        grid.innerHTML = "";
        
        for (let key in zonesData) {
            let z = zonesData[key];
            let odor = calculateOdorIntensity(z.so2, z.no2, z.pm10);
            
            let row = document.createElement('div');
            row.className = "station-row";
            row.innerHTML = `
                <div>
                    <span class="station-name">[${z.station}망]</span> ${z.name.split(" ")[0]}<br>
                    <span style="font-size:0.75rem; color:var(--text-muted);">SO₂: ${z.so2}ppm | PM10: ${z.pm10}㎍</span>
                </div>
                <span class="station-badge" style="background:${odor.color}22; color:${odor.color}; border: 1px solid ${odor.color}55;">${odor.text}</span>
            `;
            grid.appendChild(row);
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let dangerCounts = { res_namgu: 0, res_okdong: 0, res_junggu: 0, res_innovation: 0, res_donggu: 0, res_bukgu: 0, res_beoseo: 0 };

        particles.forEach(p => {
            if (windSpeed > 0) p.update();
            p.draw(ctx);
            
            if (p.life > 0.05) {
                for (let key in dangerCounts) {
                    if (isInsideCircle(p.lat, p.lng, zonesData[key].center, zonesData[key].radius)) {
                        dangerCounts[key] += p.sourceZone.so2 * 350; 
                    }
                }
            }
        });

        let maxDangerValue = 0;
        let affectedZones = [];
        let alertThreshold = 1.0; 

        for (let key in dangerCounts) {
            let currentDanger = dangerCounts[key];
            if (currentDanger > alertThreshold) {
                if(currentDanger > maxDangerValue) maxDangerValue = currentDanger;
                affectedZones.push(zonesData[key].name.split(" ")[1] || zonesData[key].name);
                
                let blinkColor = (Date.now() % 800 > 400) ? "var(--danger-color)" : "var(--warning-color)";
                zoneCircles[key].setStyle({ color: blinkColor, weight: 2, fillOpacity: 0.15 });
            } else if (currentDanger > 0.3) {
                zoneCircles[key].setStyle({ color: "var(--warning-color)", weight: 1.5, fillOpacity: 0.1 });
            } else {
                zoneCircles[key].setStyle({ color: "var(--secondary)", weight: 1, fillOpacity: 0.05 });
            }
        }

        if (affectedZones.length > 0) {
            alertPanel.className = "alert-panel status-danger";
            alertPanel.innerHTML = `🚨 복합 악취 가스 유입 경보: [${affectedZones.join(", ")}] 위험 노출 (최대 영향도: ${maxDangerValue.toFixed(2)})`;
        } else if (maxDangerValue > 0.3) {
            alertPanel.className = "alert-panel status-warning";
            alertPanel.innerHTML = `⚠️ 주의: 일부 확장 주거단지 경계 구역에 오염 기류 근접 통과 중`;
        } else {
            alertPanel.className = "alert-panel status-safe";
            alertPanel.innerHTML = "🟢 청정 상태: 실시간 풍향 조건하에 7대 광역 주거거점 악취 안전선 유지";
        }
        
        requestAnimationFrame(animate);
    }

    map.on('move', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => p.draw(ctx));
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('liveClock').innerText = `RUNNING: ${now.toLocaleTimeString()}`;
    }, 1000);

    setMode('AUTO');
    fetchAirQuality();
    setInterval(fetchKMAWeather, 600000); 
    setInterval(fetchAirQuality, 1200000); 
    animate();
</script>
</body>
</html>
